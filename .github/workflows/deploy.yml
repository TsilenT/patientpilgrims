name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run test:emulator # rules + adapter against the Firebase emulator

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      # Dual-serve during the rebrand transition: same build, second origin.
      # Best-effort: a mirror hiccup must never block the primary deploy.
      - name: Mirror to patientpilgrims.stevets.ai
        uses: peaceiris/actions-gh-pages@v4
        continue-on-error: true
        with:
          deploy_key: ${{ secrets.MIRROR_DEPLOY_KEY }}
          external_repository: TsilenT/patientpilgrims
          publish_branch: gh-pages
          publish_dir: dist
          cname: patientpilgrims.stevets.ai
          force_orphan: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # The Pages backend intermittently rejects deployments with a generic
      # "try again later" (transient; a retry reliably succeeds).
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
